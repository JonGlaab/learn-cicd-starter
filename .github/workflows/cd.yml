name: cd

on:
    push:
        branches: [main]

jobs:
    deploy:
        name: Deploy
        runs-on: ubuntu-latest 
        steps:
          - name: Check out the code
            uses: actions/checkout@v4
            
          - name: Set up go
            uses: actions/setup-go@v5
            with: 
                go-version: "1.26.0"
                
          - name: Build app
            run: "./scripts/buildprod.sh"

          - name: Deploy to Artifact Registry
            env:
              GCP_ACCESS_TOKEN: ${{ secrets.GCP_ACCESS_TOKEN }}
            run: |
              # 1. Force gcloud to look at your lab project
              gcloud config set project project-3df150e7-5b58-40ea-a45
              
              # 2. Feed gcloud a dummy config to bypass the active account check
              echo "{\"type\": \"authorized_user\", \"client_id\": \"\", \"client_secret\": \"\", \"refresh_token\": \"$GCP_ACCESS_TOKEN\"}" > dummy_creds.json
              gcloud auth activate-service-account --key-file=dummy_creds.json || gcloud auth login --cred-file=dummy_creds.json
              
              # 3. Clean up the dummy file and kick off the build
              rm dummy_creds.json
              gcloud builds submit --tag us-central1-docker.pkg.dev/project-3df150e7-5b58-40ea-a45/notely-ar-repo/notely-app:latest .