name: cd

on:
    push:
        branches: [main]

jobs:
    deploy:
        name: Deploy
        runs-on: ubuntu-latest 
        steps:
          - name: Check out the code
            uses: actions/checkout@v4
            
          - name: Set up go
            uses: actions/setup-go@v5
            with: 
                go-version: "1.26.0"
                
          - name: Build app
            run: "./scripts/buildprod.sh"

          - name: Deploy to Artifact Registry
            env:
              GCP_ACCESS_TOKEN: ${{ secrets.GCP_ACCESS_TOKEN }}
            run: |
              # 1. Force gcloud to look at your lab project
              gcloud config set project project-3df150e7-5b58-40ea-a45
              
              # 2. Tell gcloud your account name is your lab email
              gcloud config set account "jonglaab@gmail.com"
              
              # 3. Securely pipe the access token directly into gcloud auth
              echo "$GCP_ACCESS_TOKEN" | gcloud auth login --username="jonglaab@gmail.com" --no-launch-browser
              
              # 4. Kick off the build
              gcloud builds submit --tag us-central1-docker.pkg.dev/project-3df150e7-5b58-40ea-a45/notely-ar-repo/notely-app:latest .